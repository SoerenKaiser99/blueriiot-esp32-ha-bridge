# Step 1: Scan-only firmware to find your Blue Connect's MAC address
# Flash this first, watch the logs, find the MAC, then move on to blueconnect.yaml
#
# The Blue Connect Plus Salt (Gold) advertises with a name like "B200xxxxxx"
# and a MAC starting with 00:A0:50 (Blue Riiot Labs OUI).

esphome:
  name: blueconnect
  friendly_name: Blueconnect

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: "REPLACE_WITH_YOUR_API_ENCRYPTION_KEY"

ota:
  - platform: esphome
    password: "REPLACE_WITH_YOUR_OTA_PASSWORD"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Blueconnect Fallback Hotspot"
    password: "REPLACE_WITH_FALLBACK_PASSWORD"

captive_portal:

# BLE Scanner — logs every nearby BLE device with MAC, name, and RSSI
esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 1100ms
    window: 1100ms
  on_ble_advertise:
    - then:
        - lambda: |-
            ESP_LOGI("ble_scan", "Found: MAC=%s  Name=%s  RSSI=%d",
                     x.address_str().c_str(),
                     x.get_name().c_str(),
                     x.get_rssi());
